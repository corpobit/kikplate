<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member removed</title>
</head>
<body style="margin:0;padding:24px;background:#f7fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a202c;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;">
          <tr>
            <td style="padding:22px 28px 0 28px;">
              <img src="{{ .LogoURL }}" alt="Kikplate" width="140" style="display:block;height:auto;border:0;outline:none;text-decoration:none;" />
            </td>
          </tr>
          <tr>
            <td style="padding:24px 28px;">
              <h1 style="margin:0 0 12px 0;font-size:20px;">Member removed</h1>
              <p style="margin:0 0 12px 0;font-size:15px;line-height:1.6;"><strong>{{ .MemberName }}</strong> was removed from <strong>{{ .OrganizationName }}</strong>.</p>
              <p style="margin:0 0 20px 0;font-size:15px;line-height:1.6;">Removed by: <strong>{{ .RemovedBy }}</strong>.</p>
              <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 14px 0;" />
              <p style="margin:0;font-size:14px;line-height:1.7;color:#334155;">Best,<br /><strong>The Kikplate Team</strong></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
