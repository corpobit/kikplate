name: Reusable Web Quality

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string

permissions:
  contents: read

jobs:
  web-quality:
    name: Web Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run production build
        run: npm run build
