name: Reusable API Quality

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string

permissions:
  contents: read

jobs:
  api-quality:
    name: API Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...
