name: Release Helm Chart

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to release (e.g., 0.1.0, 0.2.0)'
        required: true
        type: string
      app_version:
        description: 'App version tag (image tag from GHCR)'
        required: true
        type: string
  push:
    branches:
      - helm
    paths:
      - "helm/**"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Package & Publish to OCI Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Determine version and app_version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHART_VERSION="${{ inputs.version }}"
            APP_VERSION="${{ inputs.app_version }}"
          else
            # For push events, use semantic version from git tag or default
            CHART_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
            APP_VERSION="main"
          fi
          
          echo "chart_version=${CHART_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Update Chart.yaml with version
        run: |
          sed -i "s/version: .*/version: ${{ steps.version.outputs.chart_version }}/" helm/Chart.yaml
          sed -i "s/appVersion: .*/appVersion: \"${{ steps.version.outputs.app_version }}\"/" helm/Chart.yaml

      - name: Update values.yaml with image tags
        run: |
          sed -i "s/tag: .*/tag: ${{ steps.version.outputs.app_version }}/" helm/values.yaml

      - name: Verify Chart
        run: helm lint helm/

      - name: Package chart
        run: |
          mkdir -p ./dist
          helm package helm/ --destination ./dist

      - name: Copy landing page and metadata
        run: |
          [ -f helm/index.html ] && cp helm/index.html ./dist/index.html || true
          [ -f helm/artifacthub-repo.yml ] && cp helm/artifacthub-repo.yml ./dist/artifacthub-repo.yml || true

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push chart to OCI registry
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push ./dist/kikplate-${{ steps.version.outputs.chart_version }}.tgz \
            oci://ghcr.io/${owner}/helm-charts

      - name: Create release notes
        id: release_notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          # Kikplate Helm Chart v${{ steps.version.outputs.chart_version }}

          **Chart Version:** ${{ steps.version.outputs.chart_version }}  
          **App Version:** ${{ steps.version.outputs.app_version }}

          ## Installation

          Add the OCI repository:
          \`\`\`bash
          helm registry login ghcr.io -u <username> -p <token>
          helm repo add kikplate oci://ghcr.io/${{ github.repository_owner }}/helm-charts
          \`\`\`

          Install the chart:
          \`\`\`bash
          helm install kikplate kikplate/kikplate \
            --version ${{ steps.version.outputs.chart_version }} \
            --namespace kikplate \
            --create-namespace
          \`\`\`

          ## What's Changed

          - Updated application images to `${{ steps.version.outputs.app_version }}`
          - Chart version bumped to `${{ steps.version.outputs.chart_version }}`

          For full changelog, visit the [repository](https://github.com/${{ github.repository }}).
          EOF
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: helm-v${{ steps.version.outputs.chart_version }}
          name: Helm Chart v${{ steps.version.outputs.chart_version }}
          body_path: /tmp/release_notes.md
          files: ./dist/kikplate-${{ steps.version.outputs.chart_version }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy chart to gh-pages
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p gh-pages
          cp ./dist/kikplate-${{ steps.version.outputs.chart_version }}.tgz gh-pages/
          [ -f ./dist/index.html ] && cp ./dist/index.html gh-pages/index.html || true
          [ -f ./dist/artifacthub-repo.yml ] && cp ./dist/artifacthub-repo.yml gh-pages/artifacthub-repo.yml || true

      - name: Commit and push to gh-pages
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Helm chart to version ${{ steps.version.outputs.chart_version }}"
            git push origin gh-pages
          fi
