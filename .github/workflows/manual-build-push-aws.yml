name: Manual Build + Push to AWS ECR

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build from
        required: true
        default: main
        type: string
      build_docker:
        description: Build API and Web Docker images
        required: true
        default: true
        type: boolean
      push_images:
        description: Push Docker images to AWS ECR
        required: true
        default: false
        type: boolean
      image_tag:
        description: Optional Docker image tag override
        required: false
        type: string
      build_cli:
        description: Build CLI packages (tar.gz)
        required: true
        default: true
        type: boolean
      cli_version:
        description: Optional CLI package version label override
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: manual-build-ecr-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare-meta:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      docker_tag: ${{ steps.meta.outputs.docker_tag }}
      cli_version: ${{ steps.meta.outputs.cli_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare tags
        id: meta
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          sha_short=$(git rev-parse --short=7 HEAD)
          ref_slug=$(echo "${{ inputs.ref }}" | tr '/:@' '-' | tr '[:upper:]' '[:lower:]')

          docker_tag="${{ inputs.image_tag }}"
          if [ -z "$docker_tag" ]; then
            docker_tag="manual-${ref_slug}-${sha_short}"
          fi

          cli_version="${{ inputs.cli_version }}"
          if [ -z "$cli_version" ]; then
            cli_version="$docker_tag"
          fi

          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "docker_tag=${docker_tag}" >> "${GITHUB_OUTPUT}"
          echo "cli_version=${cli_version}" >> "${GITHUB_OUTPUT}"

  api-quality:
    if: inputs.build_docker
    needs: prepare-meta
    uses: ./.github/workflows/reusable-api-quality.yml
    with:
      ref: ${{ inputs.ref }}

  web-quality:
    if: inputs.build_docker
    needs: prepare-meta
    uses: ./.github/workflows/reusable-web-quality.yml
    with:
      ref: ${{ inputs.ref }}

  cli-quality:
    if: inputs.build_cli
    needs: prepare-meta
    uses: ./.github/workflows/reusable-cli-quality.yml
    with:
      ref: ${{ inputs.ref }}

  build-and-push-images:
    name: Build and Push Docker Images to ECR
    if: inputs.build_docker
    runs-on: ubuntu-latest
    needs:
      - prepare-meta
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        if: inputs.push_images
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        if: inputs.push_images
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push API image to ECR
        if: inputs.push_images
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=api-manual-ecr
          cache-to: type=gha,mode=max,scope=api-manual-ecr
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_API }}:${{ needs.prepare-meta.outputs.docker_tag }}

      - name: Build and push web image to ECR
        if: inputs.push_images
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=web-manual-ecr
          cache-to: type=gha,mode=max,scope=web-manual-ecr
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_WEB }}:${{ needs.prepare-meta.outputs.docker_tag }}

  build-cli:
    name: Build CLI Packages
    if: inputs.build_cli
    runs-on: ubuntu-latest
    needs:
      - prepare-meta
      - cli-quality
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build CLI binaries and package tarballs
        run: |
          mkdir -p ./dist
          version="${{ needs.prepare-meta.outputs.cli_version }}"

          for os in darwin linux; do
            for arch in amd64 arm64; do
              bin="kikplate-${version}-${os}-${arch}"
              CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build -o "./dist/${bin}" ./
              tar -C ./dist -czf "./dist/${bin}.tar.gz" "${bin}"
              rm -f "./dist/${bin}"
            done
          done

          cd ./dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Upload manual CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manual-cli-artifacts-${{ needs.prepare-meta.outputs.cli_version }}
          path: |
            cli/dist/*.tar.gz
            cli/dist/checksums.txt