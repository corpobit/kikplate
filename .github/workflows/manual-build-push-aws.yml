name: Manual Build + Push to AWS ECR

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build from
        required: true
        default: main
        type: string
      build_docker:
        description: Build API and Web Docker images
        required: true
        default: true
        type: boolean
      image_tag:
        description: Optional Docker image tag override
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: manual-build-ecr-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare-meta:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.meta.outputs.docker_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare tags
        id: meta
        run: |
          sha_short=$(git rev-parse --short=7 HEAD)
          ref_slug=$(echo "${{ inputs.ref }}" | tr '/:@' '-' | tr '[:upper:]' '[:lower:]')

          docker_tag="${{ inputs.image_tag }}"
          if [ -z "$docker_tag" ]; then
            docker_tag="manual-${ref_slug}-${sha_short}"
          fi

          echo "docker_tag=${docker_tag}" >> "${GITHUB_OUTPUT}"

  api-quality:
    if: inputs.build_docker
    needs: prepare-meta
    uses: ./.github/workflows/reusable-api-quality.yml
    with:
      ref: ${{ inputs.ref }}

  web-quality:
    if: inputs.build_docker
    needs: prepare-meta
    uses: ./.github/workflows/reusable-web-quality.yml
    with:
      ref: ${{ inputs.ref }}

  build-and-push-images:
    name: Build and Push Docker Images to ECR
    if: inputs.build_docker
    runs-on: ubuntu-latest
    needs:
      - prepare-meta
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push API image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=api-manual-ecr
          cache-to: type=gha,mode=max,scope=api-manual-ecr
          tags: |
            ${{ secrets.AWS_ECR_REGISTRY_ADDRESS }}/${{ secrets.ECR_REPOSITORY_API }}:${{ needs.prepare-meta.outputs.docker_tag }}

      - name: Build and push web image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=web-manual-ecr
          cache-to: type=gha,mode=max,scope=web-manual-ecr
          tags: |
            ${{ secrets.AWS_ECR_REGISTRY_ADDRESS }}/${{ secrets.ECR_REPOSITORY_WEB }}:${{ needs.prepare-meta.outputs.docker_tag }}